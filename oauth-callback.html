<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Clip-It — TikTok OAuth bridge</title>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif;
           background: #0a0a0a; color: #fff; padding: 60px 20px; text-align: center; }
    .spinner { width: 32px; height: 32px; border: 3px solid #333; border-top-color: #6366f1;
               border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    a { color: #818cf8; }
    .small { color: #777; font-size: 12px; margin-top: 30px; }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <h1>Returning to Clip-It…</h1>
  <p id="msg">Passing your TikTok authorization back to the local app.</p>
  <p class="small">If this page doesn't redirect automatically, <a id="manual" href="#">click here</a>.</p>
  <script>
    (function () {
      // Forward all query params (code, state, error, etc.) to the local clip-it instance.
      var target = "http://localhost:3000/api/tiktok/oauth/callback" + window.location.search;
      document.getElementById("manual").href = target;
      window.location.replace(target);
    })();
  </script>
</body>
</html>
